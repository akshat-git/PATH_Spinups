# ── TCGA Dataset Config for SLURM Cluster ────────────
# Data lives at /scratch/groups/roxanad/datasets/tcga
# (bind-mounted as /tcga_data inside the container)
#
# Usage:
#   sbatch jobs/build_tcga_dataset.sh
#   # or manually:
#   python -m build_tcga_dataset --config configs/tcga_streaming.yaml

# ── What to pull from GDC ──────────────────────────
projects:
  - TCGA-LUAD
  - TCGA-LUSC
  - TCGA-LGG
  - TCGA-GBM

data_dir: /tcga_data
access: open

# ── Metadata to include in slide table ─────────────
etl:
  include_demographics: true
  include_diagnosis: true
  include_maf: true

# ── Download settings ──────────────────────────────
download:
  enabled: true
  slides: false             # slides are RANGE-STREAMED as thumbnails (step: stream_thumbnails),
                            # never fully downloaded; only MAF files download here.
  maf: true
  token_path: null
  n_processes: 8             # bumped for cluster (8 CPUs allocated)
  max_files: null

# ── Slide processing (SVS → JPG thumbnails) ───────
slides:
  thumbnail_size: [512, 512]
  n_workers: 8               # concurrent range-stream workers (I/O-bound)
  stream_fallback: true      # if a slide's thumbnail can't be range-read, do a
                             # bounded full download → openslide → delete for it

# ── Gene mutation matrix ──────────────────────────
gene_matrix:
  enabled: true
  genes: ["KRAS","TP53","EGFR","IDH"]

# ── Pipeline control ──────────────────────────────
# stream_thumbnails replaces download(slides)+process_slides: it reads only each
# slide's embedded thumbnail via HTTP Range (~MBs, not the whole ~500MB SVS) and
# keeps no SVS on disk. To use the old full-download path instead, set
# download.slides: true and swap 'stream_thumbnails' for 'download','process_slides'.
steps:
  - etl
  - manifest
  - stream_thumbnails
  - download
  - gene_matrix
  - assemble
